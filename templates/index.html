<!DOCTYPE html>
<html>
<head>

<title>DOGE AI TRADER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#08142c;
color:white;
font-family:Arial;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.card{
background:#1b2a44;
padding:15px;
border-radius:10px;
}

canvas{
background:#12213c;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>DOGE AI TRADER</h1>

<div class="grid">

<div class="card">Price: $<span id="price"></span></div>
<div class="card">Cash: $<span id="cash"></span></div>
<div class="card">DOGE: <span id="doge"></span></div>

<div class="card">Equity: $<span id="equity"></span></div>
<div class="card">Wins: <span id="wins"></span></div>
<div class="card">Losses: <span id="losses"></span></div>

</div>

<h2>DOGE Price</h2>
<canvas id="priceChart"></canvas>

<h2>Equity Curve</h2>
<canvas id="equityChart"></canvas>

<script>

let priceChart = new Chart(document.getElementById("priceChart"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"DOGE",
data:[]
}]
}
})

let equityChart = new Chart(document.getElementById("equityChart"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Portfolio",
data:[]
}]
}
})

async function loadData(){

let r = await fetch("/data")
let d = await r.json()

document.getElementById("price").innerText=d.price.toFixed(5)
document.getElementById("cash").innerText=d.cash.toFixed(2)
document.getElementById("doge").innerText=d.doge.toFixed(2)
document.getElementById("equity").innerText=d.equity.toFixed(2)

document.getElementById("wins").innerText=d.wins
document.getElementById("losses").innerText=d.losses

priceChart.data.labels = d.price_history.map((_,i)=>i)
priceChart.data.datasets[0].data = d.price_history
priceChart.update()

equityChart.data.labels = d.equity_history.map((_,i)=>i)
equityChart.data.datasets[0].data = d.equity_history
equityChart.update()

}

setInterval(loadData,1000)

</script>

</body>
</html>
