<!DOCTYPE html>
<html>
<head>
    <title>ELITE AI TRADER</title>
</head>
<body style="background:#0f172a;color:white;font-family:sans-serif;padding:20px;">

<h1>Elite AI Trader</h1>

<h2>Total Equity: ${{ total_equity }}</h2>

{% for bot in bots %}
<div style="background:#1e293b;padding:15px;margin-bottom:15px;border-radius:12px;">
    <p><strong>Strategy:</strong> {{ bot.strategy }}</p>
    <p>Capital: ${{ bot.capital }}</p>
    <p>PnL: ${{ bot.pnl }}</p>
    <p>Trades: {{ bot.trades }}</p>
</div>
{% endfor %}

</body>
</html>
